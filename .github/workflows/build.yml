name: Build & Release

on:
  push:
    branches: [ main ]
    tags:     [ "v*.*.*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet publish --configuration Release --no-build --output ./publish
      - uses: actions/upload-artifact@v4
        with:
          name: MultiRank-DLL
          path: ./publish/Jellyfin.Plugin.MultiRank.dll

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - run: |
          dotnet restore
          dotnet publish --configuration Release --output ./publish

      - name: Create ZIP
        run: |
          cd ./publish
          zip -j "../MultiRank-${{ github.ref_name }}.zip" \
            Jellyfin.Plugin.MultiRank.dll \
            Microsoft.Data.Sqlite.dll \
            SQLitePCLRaw.batteries_v2.dll \
            SQLitePCLRaw.core.dll \
            SQLitePCLRaw.provider.e_sqlite3.dll 2>/dev/null || true

      - name: Update manifest.json
        run: |
          VER="${{ github.ref_name }}"
          VER_CLEAN="${VER#v}"
          MD5=$(md5sum "MultiRank-${VER}.zip" | awk '{print $1}')
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/Zer0JellyHub/Multi-Rank/releases/download/${VER}/MultiRank-${VER}.zip"
          printf '[{"guid":"b2f3d4e5-6789-4abc-def0-123456789abc","name":"MultiRank","description":"Multi-genre ranking plugin for Jellyfin","overview":"Requires Playback Reporting Plugin","owner":"Zer0JellyHub","category":"General","versions":[{"version":"%s.0","changelog":"%s","targetAbi":"10.9.0.0","sourceUrl":"%s","checksum":"%s","timestamp":"%s"}]}]\n' \
            "$VER_CLEAN" "$URL" "$URL" "$MD5" "$TS" > manifest.json

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for ${{ github.ref_name }}" || true
          git push origin HEAD:main || true

      - uses: softprops/action-gh-release@v2
        with:
          files: MultiRank-${{ github.ref_name }}.zip
          body: |
            ### Jellyfin Repository URL
```
            https://raw.githubusercontent.com/Zer0JellyHub/Multi-Rank/main/manifest.json
```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
